<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeekAlpha — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0a1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .container { text-align: center; padding: 2rem; }
    .logo { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #7c3aed, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1.5rem; }
    .message { font-size: 1.25rem; color: #9ca3af; margin-bottom: 1rem; }
    .sub { font-size: 0.875rem; color: #6b7280; }
    .retry { margin-top: 2rem; padding: 0.75rem 2rem; background: #7c3aed; color: #fff; border: none; border-radius: 0.5rem; font-size: 1rem; cursor: pointer; }
    .retry:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">SeekAlpha</div>
    <p class="message">📡 You're offline</p>
    <p class="sub">Check your connection and try again.</p>
    <button class="retry" onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
